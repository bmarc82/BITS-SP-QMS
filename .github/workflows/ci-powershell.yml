name: CI PowerShell

on:
  push:
    paths: ['powershell/**']
  pull_request:
    paths: ['powershell/**']

jobs:
  lint-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path ./powershell -Recurse -Severity Warning
      - name: Pester Tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser
          Invoke-Pester -Path ./powershell/tests/Pester -Output Detailed
